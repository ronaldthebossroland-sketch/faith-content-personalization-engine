services:
  - type: web
    name: faith-content-personalization-engine-api
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: APP_NAME
        value: Healing School Faith Personalization Engine
      - key: STORAGE_DRIVER
        value: supabase
      - key: DATA_RETENTION_DAYS
        value: 365
      - key: DECAY_LAMBDA
        value: 0.02
      - key: BYPASS_CONSENT
        value: "false"
      - key: APPROVED_EVENT_SOURCES
        value: healing_school_app,healing_streams_registration_page,approved_healing_school_campaign,official_ministry_website,approved_email_campaign
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
